    <script>
        // 搜索功能
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                const inputValue = document.getElementById('bing_serch').value.trim();
                if (inputValue) {
                    window.location.href = "https://cn.bing.com/search?q=" + encodeURIComponent(inputValue);
                }
            }
        }

        // 绑定回车事件
        document.getElementById("bing_serch").addEventListener("keyup", handleKeyPress);

        // 页面加载完成后的焦点设置
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('bing_serch').focus();
        });
    </script>
